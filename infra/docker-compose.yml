networks:
  crm_net:
    driver: bridge

volumes:
  pgdata:
  redisdata:

services:
  postgres:
    image: postgres:15
    container_name: crm_postgres
    restart: always
    environment:
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: crm
      POSTGRES_DB: crm
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - crm_net

  redis:
    image: redis:7
    container_name: crm_redis
    restart: always
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    networks:
      - crm_net



